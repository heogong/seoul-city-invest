<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서울 시티 인베스트 (모바일)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700;800&display=swap');

  :root {
    --bg: #1a0a00;
    --board-bg: #f5e6c8;
    --board-border: #8b4513;
    --green: #2d7a3a;
    --red: #c0392b;
    --blue: #2471a3;
    --yellow: #d4ac0d;
    --purple: #7d3c98;
    --orange: #ca6f1e;
    --teal: #148f77;
    --pink: #e91e8c;
    --cell-w: 40px;
    --cell-h: 40px;
    --corner: 50px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    background-image: radial-gradient(ellipse at 20% 20%, #3d1a00 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 80%, #1a0033 0%, transparent 50%);
    height: 100dvh;
    overflow: hidden;
    font-family: 'Nanum Gothic', sans-serif;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    font-family: 'Jua', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 6px;
    background: linear-gradient(135deg, #f5c842, #e8860a, #f5c842);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
    filter: drop-shadow(0 2px 8px rgba(245,200,66,0.5));
  }

  .game-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  .board-wrap {
    flex-shrink: 0;
    display: flex;
    justify-content: center;
    padding: 6px 6px 4px;
  }

  .panel-wrap {
    flex: 1;
    width: 100%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0 6px 12px;
  }

  /* ===== BOARD ===== */
  .board {
    position: relative;
    width: calc(var(--corner)*2 + var(--cell-w)*6);
    height: calc(var(--corner)*2 + var(--cell-h)*6);
    background: var(--board-bg);
    border: 4px solid var(--board-border);
    border-radius: 4px;
    box-shadow: 0 0 40px rgba(245,200,66,0.3), inset 0 0 20px rgba(0,0,0,0.1);
    flex-shrink: 0;
  }

  .board-center {
    position: absolute;
    top: var(--corner);
    left: var(--corner);
    right: var(--corner);
    bottom: var(--corner);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #fdf6e3, #fce8b2);
    border: 2px solid var(--board-border);
    gap: 6px;
  }

  .center-title {
    font-family: 'Jua', sans-serif;
    font-size: 0.85rem;
    color: #8b1a00;
    letter-spacing: 4px;
  }

  .center-subtitle {
    font-size: 0.5rem;
    color: #8b4513;
    letter-spacing: 2px;
  }

  .dice-area {
    display: flex;
    gap: 12px;
    margin-top: 8px;
  }

  .die {
    width: 36px;
    height: 36px;
    background: #fff;
    border: 3px solid #333;
    border-radius: 10px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
    padding: 6px;
    gap: 2px;
    box-shadow: 3px 3px 0 #333;
    transition: transform 0.1s;
  }

  .die.rolling {
    animation: roll 0.5s ease-out;
  }

  .die-dot {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: #222;
  }

  .die-dot.empty {
    background: transparent;
  }

  @keyframes roll {
    0%   { transform: rotate(0deg) scale(1); }
    25%  { transform: rotate(90deg) scale(1.2); }
    50%  { transform: rotate(180deg) scale(0.9); }
    75%  { transform: rotate(270deg) scale(1.1); }
    100% { transform: rotate(360deg) scale(1); }
  }

  .btn-roll {
    font-family: 'Jua', sans-serif;
    font-size: 0.78rem;
    padding: 7px 10px;
    background: linear-gradient(135deg, #e8860a, #f5c842);
    border: none;
    border-radius: 30px;
    cursor: pointer;
    color: #1a0a00;
    font-weight: bold;
    box-shadow: 0 4px 12px rgba(245,200,66,0.4);
    transition: transform 0.1s, box-shadow 0.1s;
    margin-top: 4px;
  }

  .btn-roll:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(245,200,66,0.5); }
  .btn-roll:active { transform: translateY(1px); }
  .btn-roll:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ===== CELLS ===== */
  .cell {
    position: absolute;
    border: 1.5px solid #8b4513;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 0.42rem;
    text-align: center;
    overflow: hidden;
    cursor: default;
    background: #fdf6e3;
    transition: background 0.2s;
  }

  .cell:hover { filter: brightness(0.95); }

  .cell .color-bar {
    width: 100%;
    height: 10px;
    flex-shrink: 0;
  }

  .cell .cell-name {
    font-weight: 800;
    color: #2c1700;
    line-height: 1.2;
    padding: 1px 2px;
    font-size: 0.45rem;
  }

  .cell .cell-price {
    color: #8b1a00;
    font-size: 0.42rem;
    font-weight: 700;
  }

  .cell .cell-icon {
    font-size: 0.9rem;
    line-height: 1;
  }

  /* corner cells */
  .cell.corner {
    width: var(--corner);
    height: var(--corner);
  }

  /* bottom row */
  .cell.bottom {
    width: var(--cell-w);
    height: var(--corner);
    bottom: 0;
  }

  /* top row */
  .cell.top {
    width: var(--cell-w);
    height: var(--corner);
    top: 0;
    flex-direction: column-reverse;
  }

  .cell.top .color-bar { order: -1; }

  /* left col */
  .cell.left {
    width: var(--corner);
    height: var(--cell-h);
    left: 0;
    flex-direction: row-reverse;
  }

  .cell.left .color-bar {
    width: 10px;
    height: 100%;
  }

  /* right col */
  .cell.right {
    width: var(--corner);
    height: var(--cell-h);
    right: 0;
    flex-direction: row;
  }

  .cell.right .color-bar {
    width: 10px;
    height: 100%;
  }

  /* player tokens */
  .token {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid #fff;
    position: absolute;
    font-size: 0.75rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
    z-index: 10;
    box-shadow: 0 3px 10px rgba(0,0,0,0.7);
  }

  /* ownership dots */
  .owned-dot {
    display: none;
  }

  .building-icons {
    display: none;
  }

  /* 부동산 배지 — 최상단 (color-bar 위) */
  .cell-prop-badge {
    width: 100%;
    text-align: center;
    font-size: 0.68rem;
    font-weight: 900;
    letter-spacing: -0.3px;
    padding: 2px 1px;
    line-height: 1.2;
    flex-shrink: 0;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    order: -2;
  }

  /* 시세 변동 배지 — 부동산 배지 바로 아래, color-bar 위 */
  .cell-market-badge {
    width: 100%;
    text-align: center;
    font-size: 0.6rem;
    font-weight: 800;
    padding: 1px 1px;
    line-height: 1.2;
    flex-shrink: 0;
    order: -1;
  }

  /* left/right 세로 셀 */
  .cell.left .cell-prop-badge,
  .cell.right .cell-prop-badge {
    width: auto;
    height: auto;
    writing-mode: vertical-rl;
    padding: 2px 1px;
    font-size: 0.6rem;
    order: -2;
  }

  .cell.left .cell-market-badge,
  .cell.right .cell-market-badge {
    width: auto;
    writing-mode: vertical-rl;
    padding: 1px 0;
    font-size: 0.55rem;
    order: -1;
  }

  /* top 셀 — flex-direction: column-reverse이므로 order 반전 */
  .cell.top .cell-prop-badge  { order: 2; }
  .cell.top .cell-market-badge { order: 1; }

  /* ===== SIDE PANEL ===== */
  .panel {
    width: 100%;
    max-width: 400px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 14px 16px;
    backdrop-filter: blur(4px);
  }

  .card h3 {
    font-family: 'Jua', sans-serif;
    font-size: 1rem;
    color: #f5c842;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .player-info {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .player-info:last-child { border-bottom: none; }

  .player-token-display {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    border: 2px solid rgba(255,255,255,0.4);
    flex-shrink: 0;
    margin-top: 2px;
  }

  .player-details { flex: 1; min-width: 0; }
  .player-name { font-weight: 800; font-size: 0.88rem; }
  .player-money { font-size: 0.82rem; color: #f5c842; font-weight: 700; white-space: nowrap; }
  .player-status { font-size: 0.68rem; color: #aaa; margin-top: 2px; }

  .player-job-badge {
    display: inline-block;
    font-size: 0.7rem;
    background: rgba(245,200,66,0.12);
    border: 1px solid rgba(245,200,66,0.3);
    color: #f5c842;
    border-radius: 20px;
    padding: 1px 8px;
    margin: 3px 0 2px;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* 자산 비율 바 */
  .wealth-bar-wrap {
    display: flex;
    height: 5px;
    border-radius: 3px;
    overflow: hidden;
    background: rgba(255,255,255,0.08);
    margin-top: 5px;
  }
  .wealth-bar { height: 100%; transition: width 0.6s ease; }

  .log-box {
    max-height: 300px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .log-entry {
    font-size: 0.75rem;
    padding: 4px 6px;
    border-radius: 4px;
    background: rgba(255,255,255,0.05);
    line-height: 1.4;
    color: #ddd;
  }

  .log-entry.important {
    background: rgba(245,200,66,0.15);
    color: #f5c842;
    font-weight: 700;
  }

  .log-entry.bad {
    background: rgba(192,57,43,0.2);
    color: #ff8080;
  }

  /* 구역 점령 현황 */
  .territory-row { margin-bottom: 9px; }
  .territory-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 3px;
  }
  .territory-label {
    display: flex; align-items: center; gap: 5px;
    font-size: 0.73rem; color: #ddd;
  }
  .territory-dot {
    width: 9px; height: 9px;
    border-radius: 2px; flex-shrink: 0;
  }
  .territory-counts { font-size: 0.65rem; color: #aaa; display: flex; gap: 6px; }
  .territory-bar-wrap {
    display: flex; height: 7px; border-radius: 4px; overflow: hidden;
    background: rgba(255,255,255,0.07);
  }
  .territory-buildings {
    display: flex; gap: 4px; margin-top: 3px; flex-wrap: wrap;
  }
  .territory-building-tag {
    font-size: 0.62rem; padding: 1px 5px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.15);
  }

  /* 게임 종료 결산 모달 */
  .stats-winner-banner {
    text-align: center; padding: 12px 0 8px;
  }
  .stats-winner-icon { font-size: 3rem; line-height: 1; }
  .stats-winner-name {
    font-family: 'Jua', sans-serif;
    font-size: 1.4rem; color: #8b1a00; margin: 4px 0 2px;
  }
  .stats-turns { font-size: 0.78rem; color: #999; }
  .stats-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  .stats-table th {
    font-size: 0.7rem; color: #888; padding: 4px 6px;
    border-bottom: 1px solid rgba(139,69,19,0.3);
  }
  .stats-table td { padding: 5px 6px; font-size: 0.78rem; }
  .stats-table tr:not(:last-child) td {
    border-bottom: 1px solid rgba(139,69,19,0.15);
  }
  .stats-label { color: #777; }
  .stats-my { text-align: center; color: #c0392b; font-weight: 700; }
  .stats-ai { text-align: center; color: #2471a3; font-weight: 700; }
  .stats-highlight td { background: rgba(139,69,19,0.08); }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: linear-gradient(135deg, #fdf6e3, #fce8b2);
    border: 3px solid #8b4513;
    border-radius: 16px;
    padding: 28px 32px;
    max-width: 360px;
    width: 90%;
    color: #2c1700;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  }

  .modal h2 {
    font-family: 'Jua', sans-serif;
    font-size: 1.5rem;
    color: #8b1a00;
    margin-bottom: 10px;
  }

  .modal p { font-size: 0.95rem; line-height: 1.6; margin-bottom: 16px; }

  .modal-btns { display: flex; gap: 10px; justify-content: center; }

  .btn-yes, .btn-no {
    font-family: 'Jua', sans-serif;
    padding: 10px 28px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-size: 1rem;
    transition: transform 0.1s;
  }

  .btn-yes {
    background: linear-gradient(135deg, #2d7a3a, #4caf50);
    color: #fff;
    box-shadow: 0 4px 12px rgba(45,122,58,0.4);
  }

  .btn-no {
    background: linear-gradient(135deg, #c0392b, #e74c3c);
    color: #fff;
    box-shadow: 0 4px 12px rgba(192,57,43,0.4);
  }

  .btn-yes:hover, .btn-no:hover { transform: translateY(-2px); }

  .btn-ok {
    font-family: 'Jua', sans-serif;
    padding: 10px 40px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-size: 1rem;
    background: linear-gradient(135deg, #e8860a, #f5c842);
    color: #1a0a00;
    box-shadow: 0 4px 12px rgba(245,200,66,0.4);
    transition: transform 0.1s;
  }
  .btn-ok:hover { transform: translateY(-2px); }

  .card-display {
    background: linear-gradient(135deg, #1a3a5c, #0d2137);
    border: 2px solid #4a90d9;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 12px;
    color: #fff;
  }

  .card-display.chance { background: linear-gradient(135deg, #7d3c98, #4a235a); border-color: #c39bd3; }
  .card-display.public  { background: linear-gradient(135deg, #1a5c2a, #0d2e14); border-color: #82e0aa; }

  .card-display .card-type { font-size: 0.75rem; letter-spacing: 2px; opacity: 0.7; margin-bottom: 6px; }
  .card-display .card-text { font-size: 1rem; font-weight: 700; line-height: 1.5; }

  .turn-indicator {
    font-size: 0.65rem;
    padding: 4px 10px;
    border-radius: 20px;
    display: inline-block;
    margin-bottom: 4px;
  }

  .turn-player { background: rgba(245,200,66,0.2); color: #f5c842; }
  .turn-ai { background: rgba(100,150,255,0.2); color: #89b4ff; }

  .building-btn {
    font-family: 'Jua', sans-serif;
    font-size: 0.8rem;
    padding: 5px 12px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    border-radius: 20px;
    cursor: pointer;
    transition: background 0.2s;
    margin: 2px;
  }

  .building-btn:hover { background: rgba(255,255,255,0.2); }

  .properties-list {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    max-height: 120px;
    overflow-y: auto;
  }

  .prop-tag {
    font-size: 0.65rem;
    padding: 2px 6px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    cursor: pointer;
    transition: transform 0.1s;
  }
  .prop-tag:hover { transform: scale(1.05); }

  .game-over-banner {
    font-family: 'Jua', sans-serif;
    font-size: 2rem;
    text-align: center;
    color: #f5c842;
    text-shadow: 0 0 20px rgba(245,200,66,0.8);
    animation: pulse 1s infinite alternate;
  }

  @keyframes pulse {
    from { opacity: 0.7; transform: scale(0.98); }
    to   { opacity: 1;   transform: scale(1.02); }
  }

  /* 턴 알림 오버레이 */
  #turnOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
  }
  #turnOverlay.show { display: flex; }
  #turnOverlayText {
    font-family: 'Jua', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 4px;
    animation: turnPop 0.4s ease-out;
  }
  #turnOverlaySub {
    font-size: 1rem;
    color: rgba(255,255,255,0.7);
    letter-spacing: 2px;
  }
  @keyframes turnPop {
    0%   { transform: scale(0.5); opacity: 0; }
    70%  { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1);   opacity: 1; }
  }
</style>
</head>
<body>

<div class="game-area">
  <canvas id="boardCanvas" style="display:none"></canvas>
  <div class="board-wrap">
  <div class="board" id="board">
    <div class="board-center">
      <div class="center-title">서울 시티 인베스트</div>
      <div class="center-subtitle">KOREA EDITION</div>
      <div class="dice-area">
        <div class="die" id="die1"></div>
        <div class="die" id="die2"></div>
      </div>
      <button class="btn-roll" id="btnRoll" onclick="rollDice()">🎲 주사위 굴리기</button>
      <button id="btnSellProp" onclick="openSellModal()"
        style="display:none;margin-top:6px;width:100%;padding:8px 0;
        background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff;
        border:none;border-radius:20px;font-family:Jua,sans-serif;
        font-size:0.85rem;font-weight:bold;cursor:pointer">
        🏷️ 부동산 매도
      </button>
      <div id="turnIndicator" class="turn-indicator turn-player">내 차례</div>
      <div id="moveCounter" style="font-size:0.75rem;color:#f5c842;min-height:18px;margin-top:2px"></div>
    </div>
  </div>
  </div><!-- /board-wrap -->

  <div class="panel-wrap">
  <div class="panel">
    <div class="card" id="playerCard">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <h3 style="margin:0">👤 플레이어 현황</h3>
        <span id="turnCounter" style="font-size:0.75rem;color:#aaa"></span>
      </div>
      <div id="turnProgressWrap" style="margin-bottom:10px;display:none">
        <div style="display:flex;justify-content:space-between;font-size:0.7rem;color:#aaa;margin-bottom:3px">
          <span>⏰ 턴 진행</span>
          <span id="turnProgressLabel"></span>
        </div>
        <div style="height:6px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden">
          <div id="turnProgressBar" style="height:100%;background:linear-gradient(90deg,#27ae60,#f1c40f,#e74c3c);border-radius:4px;transition:width 0.4s"></div>
        </div>
        <div style="font-size:0.68rem;color:#aaa;margin-top:3px;text-align:right">🏆 순자산 100억 또는 50바퀴 후 종료</div>
      </div>
      <div class="player-info" id="playerInfo0">
        <div class="player-token-display" id="myTokenDisplay" style="background:#e74c3c">🚀</div>
        <div class="player-details">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div class="player-name">나 (플레이어)</div>
            <div class="player-money" id="myMoney">💰 0원</div>
          </div>
          <div class="player-job-badge" id="myJob">📚 취준생 · 월급 없음</div>
          <div class="player-status" id="myStatus">출발지 대기중</div>

function renderDie(elId, value) {
  const el = document.getElementById(elId);
  if(!el) return;
  el.innerHTML = '';
  const active = DIE_DOTS[value] || [];
  for(let i = 0; i < 9; i++) {
    const dot = document.createElement('div');
    dot.className = 'die-dot' + (active.includes(i) ? '' : ' empty');
    el.appendChild(dot);
  }
}

const fmt = n => {
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  if (abs >= 100000000) {
    const uk = abs / 100000000;
    const rem = Math.round((abs % 100000000) / 10000);
    if (rem > 0) return sign + uk.toFixed(0) + '억 ' + rem.toLocaleString('ko-KR') + '만원';
    return sign + uk.toFixed(0) + '억원';
  } else if (abs >= 10000) {
    return sign + Math.round(abs / 10000).toLocaleString('ko-KR') + '만원';
  }
  return sign + abs.toLocaleString('ko-KR') + '원';
};

function getJobForGrade(grade) {
  const pool = JOBS.filter(j => j.grade === grade);
  if(!pool.length) return JOBS[0];
  return pool[Math.floor(Math.random() * pool.length)];
}

// ==================== TURN ANNOUNCE (2초 표시) ====================
function announceTurn() {
  state.phase = 'turn_announce';
  const cp = state.players[state.currentPlayer];
  document.getElementById('btnRoll').disabled = true;
  updateUI(); // 잔액 즉시 반영

  // 오버레이 표시
  const overlay = document.getElementById('turnOverlay');
  const overlayText = document.getElementById('turnOverlayText');
  const overlaySub = document.getElementById('turnOverlaySub');

  if(cp.isAI) {
    overlayText.style.color = '#89b4ff';
    overlayText.textContent = '🤖 AI 차례!';
    overlaySub.textContent = 'AI가 생각 중입니다...';
  } else {
    overlayText.style.color = '#f5c842';
    overlayText.textContent = '🚀 내 차례!';
    overlaySub.textContent = '주사위를 굴릴 준비를 하세요!';
  }
  overlay.classList.add('show');

  const ind = document.getElementById('turnIndicator');
  if(cp.isAI) {
    ind.textContent = `🤖 AI 차례`;
    ind.className = 'turn-indicator turn-ai';
  } else {
    ind.textContent = `🚀 내 차례`;
    ind.className = 'turn-indicator turn-player';
  }

  // 2초 후 오버레이 닫고 roll 단계로
  setTimeout(() => {
    overlay.classList.remove('show');
    state.phase = 'roll';

    // 코인 투자 결과 확인
    const pending = state._coinInvestment;
    if(pending && pending.playerIdx === state.currentPlayer) {
      resolveCoinInvestment(cp, ind);
      return;
    }

    updateUI();
    if(cp.isAI) {
      ind.textContent = 'AI 진행중...';
      setTimeout(() => aiTurn(), 400);
    } else {
      ind.textContent = '내 차례 — 주사위를 굴리세요!';
      document.getElementById('btnRoll').disabled = false;
    }
  }, 2000);
}

  // remove old cells
  board.querySelectorAll('.cell').forEach(e => e.remove());
  board.querySelectorAll('.token').forEach(e => e.remove());

  const cw = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell-w'));
  const ch = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell-h'));
  const corner = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--corner'));

  // Build 40 cell position mapping
  // 0 = bottom-right corner, going counter-clockwise
  // Actually: 0=bottom-right, 1-9=bottom row right to left, 10=bottom-left, 11-19=left col bottom to top, 20=top-left, 21-29=top row left to right, 30=top-right, 31-39=right col top to bottom

  const positions = [];

  // 0: bottom-right corner
  positions[0] = { cls:'corner', style:`bottom:0;right:0;width:${corner}px;height:${corner}px;` };

  // 1-6: bottom row, right to left
  for(let i=1;i<=6;i++) {
    positions[i] = { cls:'bottom', style:`bottom:0;right:${corner + (i-1)*cw}px;width:${cw}px;height:${corner}px;` };
  }

  // 7: bottom-left corner
  positions[7] = { cls:'corner', style:`bottom:0;left:0;width:${corner}px;height:${corner}px;` };

  // 8-13: left col, bottom to top
  for(let i=8;i<=13;i++) {
    positions[i] = { cls:'left', style:`left:0;bottom:${corner + (i-8)*ch}px;width:${corner}px;height:${ch}px;` };
  }

  // 14: top-left corner
  positions[14] = { cls:'corner', style:`top:0;left:0;width:${corner}px;height:${corner}px;` };

  // 15-20: top row, left to right
  for(let i=15;i<=20;i++) {
    positions[i] = { cls:'top', style:`top:0;left:${corner + (i-15)*cw}px;width:${cw}px;height:${corner}px;` };
  }

  // 21: top-right corner
  positions[21] = { cls:'corner', style:`top:0;right:0;width:${corner}px;height:${corner}px;` };

  // 22-27: right col, top to bottom
  for(let i=22;i<=27;i++) {
    positions[i] = { cls:'right', style:`right:0;top:${corner + (i-22)*ch}px;width:${corner}px;height:${ch}px;` };
  }

  CELLS.forEach((cell, idx) => {
    const pos = positions[idx];
    const el = document.createElement('div');
    el.className = `cell ${pos.cls}`;
    el.id = `cell-${idx}`;
    el.style.cssText += pos.style;
    el.dataset.id = idx;

    let innerHTML = '';

    if(cell.type === 'prop') {
      const c = COLORS[cell.color] || '#999';
      innerHTML += `<div class="color-bar" style="background:${c};order:0"></div>`;
      innerHTML += `<div class="cell-name" style="order:1">${cell.name}</div>`;
    } else {
      innerHTML += `<div class="cell-icon">${cell.icon || ''}</div>`;
      innerHTML += `<div class="cell-name">${cell.name}</div>`;
      if(cell.type === 'transport' || cell.type === 'utility') {
        innerHTML += `<div class="cell-price">${cell.price >= 100000000 ? (cell.price/100000000) + '억' : (cell.price/10000) + '만'}</div>`;
      }
    }
    el.onclick = () => onCellClick(idx);
    el.style.cursor = 'pointer';

    el.innerHTML = innerHTML;
    board.appendChild(el);
  });

  renderTokens();
}

function getCellCenter(idx) {
  const el = document.getElementById(`cell-${idx}`);
  if(!el) return {x:0,y:0};
  const board = document.getElementById('board');
  const br = el.getBoundingClientRect();
  const bbr = board.getBoundingClientRect();
  return {
    x: br.left - bbr.left + br.width/2,
    y: br.top - bbr.top + br.height/2
  };
}

function renderTokens() {
  document.querySelectorAll('.token').forEach(e => e.remove());
  const board = document.getElementById('board');
  const size = 22;

  state.players.forEach((p, pi) => {
    const {x, y} = getCellCenter(p.pos);
    const token = document.createElement('div');
    token.className = 'token';
    token.id = `token-${pi}`;
    token.style.background = p.color;
    // 두 말이 같은 칸에 있을 때 살짝 옆으로
    const offset = pi === 0 ? -(size/2 + 2) : 2;
    token.style.left = (x + offset) + 'px';
    token.style.top  = (y - size/2) + 'px';
    token.style.width  = size + 'px';
    token.style.height = size + 'px';
    token.style.fontSize = '0.75rem';
    token.textContent = p.icon;
    board.appendChild(token);
  });
}

function renderCellOwnership() {
  CELLS.forEach((cell, idx) => {
    const el = document.getElementById(`cell-${idx}`);
    if(!el) return;

    el.querySelectorAll('.cell-prop-badge, .cell-market-badge').forEach(e => e.remove());
    if(cell.type !== 'prop') return;

    // ── 시세 변동 배지 ──────────────────────────────
    const pct = state._marketChanges && state._marketChanges[idx];
    if(pct) {
      const mb = document.createElement('div');
      mb.className = 'cell-market-badge';
      const isUp = pct > 0;
      mb.textContent = isUp ? `▲${pct}%` : `▼${pct}%`;
      mb.style.background = isUp ? '#1a6b2f' : '#7b1a1a';
      mb.style.color       = isUp ? '#82e0aa' : '#f1948a';
      el.appendChild(mb);
    }

    // ── 부동산 배지 다중 표시 ───────────────────────
    const list = state.props[idx];
    if(!list || list.length === 0) return;

    // 여러 채를 한 줄에 나열하는 컨테이너
    const wrap = document.createElement('div');
    wrap.className = 'cell-prop-badge';
    wrap.style.display = 'flex';
    wrap.style.flexWrap = 'wrap';
    wrap.style.gap = '1px';
    wrap.style.justifyContent = 'center';
    wrap.style.padding = '1px';
    wrap.style.background = 'transparent';

    list.forEach(entry => {
      const owner = state.players[entry.owner];
      const label = ['', '빌라', '아파트', '빌딩'][entry.buildings] || '';
      if(!label) return;
      const span = document.createElement('span');
      span.textContent = label;
      span.style.background = owner.color;
      span.style.color = '#fff';
      span.style.borderRadius = '2px';
      span.style.padding = '0 2px';
      span.style.fontSize = '0.6rem';
      span.style.fontWeight = '900';
      span.style.textShadow = '0 1px 2px rgba(0,0,0,0.5)';
      span.style.lineHeight = '1.3';
      wrap.appendChild(span);
    });

    el.appendChild(wrap);
  });
}

// ==================== LOG ====================
function addLog(msg, type='') {
  state.log.unshift({ msg, type });
  if(state.log.length > 50) state.log.pop();
  const box = document.getElementById('logBox');
  box.innerHTML = state.log.slice(0,20).map(l =>
    `<div class="log-entry ${l.type}">${l.msg}</div>`
  ).join('');
}

// ==================== UI UPDATE ====================
function updateUI() {
  state.players.forEach((p, i) => {
    const prefix = i===0 ? 'my' : 'ai';
    document.getElementById(prefix+'Money').textContent = '💰 ' + fmt(p.money);
    let status = `📍 ${CELLS[p.pos].name}`;
    const laps = p.laps || 0;
    status += ` · ${laps}바퀴 완주`;
    document.getElementById(prefix+'Status').textContent = status;

    const jobEl = document.getElementById(prefix+'Job');
    if(jobEl && p.job) {
      jobEl.textContent = `${p.job.icon} ${p.job.name} · ${p.job.salary > 0 ? fmt(p.job.salary) : '월급 없음'}`;
    }
  });
  updateLoanUI();

  // 매도 버튼 — 내 차례 roll 단계이고 소유 부동산 있을 때
  const btnSell = document.getElementById('btnSellProp');
  if(btnSell) {
    const canSell = state.currentPlayer === 0 &&
      state.phase === 'roll' &&
      allOwnedBy(0).length > 0;
    btnSell.style.display = canSell ? 'block' : 'none';
  }

  // 턴 진행 바
  const turnWrap = document.getElementById('turnProgressWrap');
  const turnBar  = document.getElementById('turnProgressBar');
  const turnLabel= document.getElementById('turnProgressLabel');
  const turnCtr  = document.getElementById('turnCounter');
  if(turnWrap && state.totalTurns > 0) {
    turnWrap.style.display = 'block';
    const _curLaps = Math.max(state.players[0].laps||0, state.players[1].laps||0);
    const pct = Math.min(100, (_curLaps / MAX_LAPS) * 100);
    turnBar.style.width = pct + '%';
    turnLabel.textContent = `${_curLaps} / ${MAX_LAPS}바퀴`;
    turnCtr.textContent = `${Math.max(state.players[0].laps||0,state.players[1].laps||0)}바퀴`;
    // 순자산 100억 근접 알림
    const myNW = getNetWorth(0);
    const aiNW = getNetWorth(1);
    const maxNW = Math.max(myNW, aiNW);
    if(maxNW >= WIN_NET_WORTH * 0.8) {
      turnCtr.innerHTML += ` <span style="color:#f1c40f">🏆${Math.round(maxNW/100000000)}억</span>`;
    }
  }

  // 자산 비율 바 업데이트
  const myMoney = Math.max(0, state.players[0].money);
  const aiMoney = Math.max(0, state.players[1].money);
  const totalMoney = myMoney + aiMoney || 1;
  const myPct = (myMoney / totalMoney * 100).toFixed(1);
  const aiPct = (100 - myPct).toFixed(1);
  const myBar = document.getElementById('myWealthBar');
  const aiBar = document.getElementById('aiWealthBar');
  if(myBar) myBar.style.width = myPct + '%';
  if(aiBar) aiBar.style.width = aiPct + '%';

  const cp = state.players[state.currentPlayer];
  const ind = document.getElementById('turnIndicator');
  if(state.phase === 'turn_announce') {
    // 이미 announceTurn에서 처리
  } else if(cp.isAI) {
    ind.textContent = 'AI 진행중...';
    ind.className = 'turn-indicator turn-ai';
  } else {
    ind.textContent = '내 차례';
    ind.className = 'turn-indicator turn-player';
  }

  const btnRoll = document.getElementById('btnRoll');
  btnRoll.disabled = state.phase !== 'roll' || cp.isAI;
  btnRoll.textContent = '🎲 주사위 굴리기';

  renderCellOwnership();
  renderBuildPanel();
  renderTerritoryPanel();
}

function renderBuildPanel() {
  const content = document.getElementById('buildContent');
  const owned = allOwnedBy(0).filter(({cellId})=>CELLS[cellId].type==='prop');

  if(owned.length === 0) {
    content.innerHTML = '<span style="color:#aaa;font-size:0.8rem">아직 소유한 땅이 없습니다.</span>';
    return;
  }

  const canTrade = state.phase === 'on_my_prop';

  content.innerHTML = '<div class="properties-list">' +
    owned.map(({cellId, entry}) => {
      const cell = CELLS[cellId];
      const bld  = getBld(cellId);
      const col  = COLORS[cell.color] || '#999';
      const lvl  = entry.buildings;
      const nextLvl = lvl < 3 ? lvl+1 : null;
      const cost = nextLvl ? (bld.buy[nextLvl] - bld.buy[lvl]) : 0;
      const isLanded = canTrade && cellId === state._landedCellId;
      return `<span class="prop-tag"
        style="background:${isLanded?col+'55':col+'22'};border-color:${isLanded?col:col+'66'};
        color:#fff;cursor:${isLanded?'pointer':'default'};
        ${isLanded?'box-shadow:0 0 6px '+col+';font-weight:700;':''}"
        onclick="${isLanded?'openTradeModal()':'void(0)'}">
        ${isLanded?'🏠 ':''}${cell.name} [${BLD_NAMES[lvl]}]
      </span>`;
    }).join('') + '</div>';
}

// ==================== MODAL ====================
function showModal(title, content, buttons) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalContent').innerHTML = content;
  const btns = document.getElementById('modalBtns');
  btns.innerHTML = '';
  buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.className = b.cls || 'btn-ok';
    btn.textContent = b.text;
    btn.onclick = () => {
      btn.onclick = null;
      document.getElementById('modalOverlay').classList.remove('show');
      if(b.cb) b.cb();
    };
    btns.appendChild(btn);
  });
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(cb) {
  document.getElementById('modalOverlay').classList.remove('show');
  if(cb) cb();
}

// ==================== DICE ====================
function rollDice() {
  if(state.phase !== 'roll') return;
  const cp = state.players[state.currentPlayer];
  if(cp.isAI) return;

  doRoll();
}

function doRoll() {
  const d1 = Math.floor(Math.random()*6)+1;
  const d2 = Math.floor(Math.random()*6)+1;
  const isDouble = d1 === d2;
  const total = d1 + d2;

  const die1 = document.getElementById('die1');
  const die2 = document.getElementById('die2');
  die1.classList.add('rolling');
  die2.classList.add('rolling');
  setTimeout(() => {
    die1.classList.remove('rolling');
    die2.classList.remove('rolling');
    renderDie('die1', d1);
    renderDie('die2', d2);
  }, 500);

  const cp = state.players[state.currentPlayer];
  addLog(`${cp.name}: 🎲 ${d1}+${d2}=${total}${isDouble?' (더블!)':''}`);

  setTimeout(() => {
    if(isDouble) {
      state.doubleCount++;
      if(state.doubleCount >= 3) {
        addLog(`${cp.name}: 더블 3회! 한 번 쉽니다.`, 'bad');
        endTurn(false);
        return;
      }
    } else {
      state.doubleCount = 0;
    }
    movePlayer(state.currentPlayer, total, isDouble);
  }, 600);
}

// ==================== MOVEMENT (한 칸씩) ====================
function handleLapCompletion(playerIdx) {
  const cp = state.players[playerIdx];
  cp.laps = (cp.laps || 0) + 1;

  checkMarketFluctuation(playerIdx);
  payLoanInterest(playerIdx);

  const oldJob = cp.job;
  const isJobChangeLap = (cp.laps - 1) % 3 === 0;
  const currentGrade = Math.max(1, 10 - Math.floor((cp.laps - 1) / 3) - (cp.gradeBonus || 0));
  let newJob;
  if(isJobChangeLap) {
    newJob = getJobForGrade(currentGrade);
    cp.job = newJob;
  } else {
    newJob = cp.job;
  }
  cp.money += newJob.salary;
  if(newJob.salary > 0) trackSalary(playerIdx, newJob.salary, newJob.name);

  if(!cp.isAI) {
    cp._pendingJobEvent = { newJob, oldJob, salary: newJob.salary };
  } else {
    if(isJobChangeLap) {
      addLog(`AI: 새 직업 → ${newJob.icon} ${newJob.name} (월급 +${fmt(newJob.salary)})`, 'important');
    } else {
      addLog(`AI: 급여 +${fmt(newJob.salary)} (${newJob.icon} ${newJob.name})`, 'important');
    }
  }
}

function movePlayer(playerIdx, steps, isDouble) {
  const cp = state.players[playerIdx];
  state.phase = 'moving';
  document.getElementById('btnRoll').disabled = true;

  let remaining = steps;

  function stepOne() {
    if(remaining <= 0) {
      document.getElementById('moveCounter').textContent = '';
      setTimeout(() => landOn(playerIdx, isDouble), 300);
      return;
    }

    const oldPos = cp.pos;
    cp.pos = (cp.pos + 1) % 28;
    remaining--;

    // 출발점 통과 체크
    if(cp.pos === 0 && oldPos !== 0) {
      handleLapCompletion(playerIdx);
    }

    document.getElementById('moveCounter').textContent = `이동중... 남은 칸: ${remaining}`;
    renderTokens();
    updateUI();

    setTimeout(stepOne, 220);
  }

  stepOne();
}

function landOn(playerIdx, isDouble) {
  const cp = state.players[playerIdx];
  const cell = CELLS[cp.pos];
  addLog(`${cp.name}: ${cell.name} 도착`);

  state.phase = 'action';
  updateUI();

  processLandOnEvents(playerIdx, isDouble);
}

// 착지 후 팝업 이벤트 체인: 첫구매 → 시세변동 → 직업/월급 → 셀핸들러
function processLandOnEvents(playerIdx, isDouble) {
  const cp = state.players[playerIdx];
  if(cp.isAI) { resumeLandOn(playerIdx, isDouble); return; }

  // 1. 첫 부동산 구매 알림
  if(state._pendingFirstPropEvent) {
    const { playerIdx: buyer, cellId, cost } = state._pendingFirstPropEvent;
    delete state._pendingFirstPropEvent;
    const buyer_cp  = state.players[buyer];
    const cell      = CELLS[cellId];
    const col       = COLORS[cell.color] || '#888';
    const html = `
      <div style="text-align:center;padding:8px 0">
        <div style="font-size:2rem;margin-bottom:4px">🏆</div>
        <div style="font-size:1rem;font-weight:800;color:#f5c842;margin-bottom:10px">게임 첫 부동산 거래!</div>
        <div style="background:rgba(255,255,255,0.07);border-radius:10px;padding:12px;font-size:0.85rem;text-align:left;line-height:2">
          <div><span style="color:#aaa">👤 구매자</span>&nbsp; <b>${buyer_cp.icon} ${buyer_cp.name}</b></div>
          <div><span style="color:#aaa">🏘️ 부동산</span>&nbsp; <b>${cell.name}</b>
            <span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${col};margin-left:4px;vertical-align:middle"></span>
          </div>
          <div><span style="color:#aaa">💼 직업</span>&nbsp; <b>${buyer_cp.job.icon} ${buyer_cp.job.name}</b></div>
          <div><span style="color:#aaa">🔄 바퀴</span>&nbsp; <b>${buyer_cp.laps}바퀴 완주</b></div>
          <div><span style="color:#aaa">💰 구매가</span>&nbsp; <b style="color:#82e0aa">${fmt(cost)}</b></div>
        </div>
        <p style="margin-top:10px;font-size:0.78rem;color:#aaa">첫 구매를 시작으로 서울을 정복하세요! 🗺️</p>
      </div>`;
    showModal('🏆 첫 부동산 거래!', html, [{
      text: '확인 ✅', cls: 'btn-ok',
      cb: () => { closeModal(); processLandOnEvents(playerIdx, isDouble); }
    }]);
    return;
  }

  // 2. 시세 변동 알림
  if(state._pendingMarketEvent) {
    const { content } = state._pendingMarketEvent;
    delete state._pendingMarketEvent;
    showModal('📊 부동산 시세 변동!', content, [{
      text: '확인 ✅', cls: 'btn-ok',
      cb: () => { closeModal(); processLandOnEvents(playerIdx, isDouble); }
    }]);
    return;
  }

  // 3. 직업/월급 → 셀 핸들러
  resumeLandOn(playerIdx, isDouble);
}

function flushPendingJobEvent(playerIdx, done) {
  const cp = state.players[playerIdx];
  if(!cp._pendingJobEvent) { done(); return; }
  const { newJob, oldJob, salary } = cp._pendingJobEvent;
  delete cp._pendingJobEvent;
  const isNewJob = oldJob.name !== newJob.name;
  const gradeLabel = newJob.grade ? `<div style="margin-bottom:6px"><span style="display:inline-block;background:#ff9500;color:#fff;font-size:0.7rem;font-weight:800;padding:2px 8px;border-radius:10px">${newJob.grade}등급</span></div>` : '';
  const jobHtml = `
    <div style="text-align:center;padding:8px 0">
      ${gradeLabel}
      <div style="font-size:2.5rem;margin-bottom:6px">${newJob.icon}</div>
      <div style="font-size:1.2rem;font-weight:800;color:#2c1700;margin-bottom:4px">${newJob.name}</div>
      <div style="font-size:0.85rem;color:#666;margin-bottom:14px">${newJob.desc}</div>
      <div style="background:#f5f0e0;border-radius:10px;padding:10px;font-size:0.9rem;color:#2c1700">
        ${isNewJob ? `<div style="color:#888;font-size:0.78rem;margin-bottom:6px">${oldJob.icon} ${oldJob.name} → ${newJob.icon} ${newJob.name}</div>` : ''}
        <div style="font-size:1.1rem;font-weight:800;color:#c0392b">
          💼 월급 +${fmt(salary)}
        </div>
      </div>
    </div>`;
  const title = isNewJob ? `🎉 직업 변경!` : `💼 월급 수령`;
  showModal(title, jobHtml, [{ text: '받기 💰', cls: 'btn-ok', cb: done }]);
}

function resumeLandOn(playerIdx, isDouble) {
  const cp = state.players[playerIdx];
  const cell = CELLS[cp.pos];
  flushPendingJobEvent(playerIdx, () => dispatchCell(playerIdx, isDouble, cell.type));
}

function dispatchCell(playerIdx, isDouble, type) {
  switch(type) {
    case 'go': endTurn(isDouble); break;
    case 'prop': handleProp(playerIdx, isDouble); break;
    case 'transport': handleTransport(playerIdx, isDouble); break;
    case 'utility': handleUtility(playerIdx, isDouble); break;
    case 'tax': handleTax(playerIdx, isDouble); break;
    case 'chance': drawChance(playerIdx, isDouble); break;
    case 'community': drawCommunity(playerIdx, isDouble); break;
    case 'incentive': handleIncentive(playerIdx, isDouble); break;
    case 'lotto': handleLotto(playerIdx, isDouble); break;
    case 'cheongak': handleCheongak(playerIdx, isDouble); break;
    case 'gradeup': handleGradeUp(playerIdx, isDouble); break;
    case 'free': endTurn(isDouble); break;
    case 'coinexchange': handleCoinExchange(playerIdx, isDouble); break;
    default: endTurn(isDouble);
  }
}

// ==================== 직업 승급 ====================
function handleGradeUp(playerIdx, isDouble) {
  const cp = state.players[playerIdx];
  const effectiveLaps = Math.max(1, cp.laps || 1);
  const currentGrade = Math.max(1, 10 - Math.floor((effectiveLaps - 1) / 3) - (cp.gradeBonus || 0));
  const newGrade = Math.max(1, currentGrade - 1);

  if(newGrade < currentGrade) {
    cp.gradeBonus = (cp.gradeBonus || 0) + 1;
    const oldJob = cp.job;
    const newJob = getJobForGrade(newGrade);
    cp.job = newJob;

    if(!cp.isAI) {
      const gradeHtml = `
        <div style="text-align:center;padding:8px 0">
          <div style="margin-bottom:10px">
            <span style="background:#aaa;color:#fff;padding:2px 8px;border-radius:10px;font-size:0.75rem">${currentGrade}등급</span>
            <span style="margin:0 8px;font-size:1.1rem">→</span>
            <span style="background:#ff9500;color:#fff;padding:2px 8px;border-radius:10px;font-size:0.75rem;font-weight:800">${newGrade}등급 ⬆️</span>
          </div>

// ==================== PROPERTY ====================
function handleProp(playerIdx, isDouble) {
  const cp   = state.players[playerIdx];
  const cell = CELLS[cp.pos];
  const list = propEntries(cp.pos);

  const others = otherEntries(cp.pos, playerIdx);

  // ── 통행료 정산 ──────────────────────────────────────────
  if(others.length > 0) {
    let totalRent = 0;
    const rentLog = [];
    others.forEach(e => {
      const rent = cell.rent ? cell.rent[e.buildings] : 0;
      const owner = state.players[e.owner];
      const actual = Math.min(rent, Math.max(0, cp.money - totalRent));
      totalRent += actual;
      owner.money += actual;
      rentLog.push(`${owner.name}[${BLD_NAMES[e.buildings]}] ${fmt(actual)}`);
    });
    cp.money -= totalRent;
    trackRentPaid(playerIdx, totalRent);
    addLog(`${cp.name}: 통행료 합계 ${fmt(totalRent)} [${rentLog.join(' / ')}]`, 'bad');
    if(cp.money < 0) { checkBankruptcy(playerIdx, isDouble); return; }
  }

  // ── 구매 모달 직접 표시 ──────────────────────────────────
  if(!cp.isAI) {
    state._landedCellId = cp.pos;
    showBuyBuildingModal(playerIdx, cp.pos, isDouble);
  } else {
    const bld = getBld(cp.pos);
    let bestLvl = 0;
    for(let i = 3; i >= 1; i--) {
      if(cp.money >= bld.buy[i] * 1.2) { bestLvl = i; break; }
    }
    if(bestLvl > 0) {
      const cost = bld.buy[bestLvl];
      cp.money -= cost;
      if(!state.props[cp.pos]) state.props[cp.pos] = [];
      state.props[cp.pos].push({ owner: playerIdx, buildings: bestLvl });
      trackPropBought(playerIdx, cp.pos, cost);
      addLog(`${cp.name}: ${cell.name} ${BLD_NAMES[bestLvl]} 매수! (${fmt(cost)})`, 'important');
    } else {
      addLog(`${cp.name}: ${cell.name} — 자금 부족, 구매 포기`);
    }
    endTurn(isDouble);
  }
}

function handleIncentive(playerIdx, isDouble) {
  const cp  = state.players[playerIdx];
  const job = cp.job;
  const rate = INCENTIVE_RATE[job.name] ?? 1.0;
  const bonus = Math.round(job.salary * rate);

  if(bonus <= 0) {
    const msg = `${job.icon} ${job.name}은 인센티브 대상이 아닙니다.`;
    if(cp.isAI) {
      addLog(`AI: 💰 인센티브 구역 — ${msg}`, 'normal');
      endTurn(isDouble);
    } else {
      showModal('💰 인센티브 구역',
        `<div style="text-align:center;padding:8px 0">
          <div style="font-size:2rem;margin-bottom:8px">${job.icon}</div>
          <p><b>${job.name}</b></p>

        </div>`,
        [{ text:'확인', cls:'btn-ok', cb: () => { closeModal(); endTurn(isDouble); } }]
      );
    }
    return;
  }

  cp.money += bonus;
  trackSalary(playerIdx, bonus, job.name + ' 인센티브');

  const rateLabel = rate >= 1 ? `월급의 ${rate}배` : `월급의 ${rate * 100}%`;
  if(cp.isAI) {
    addLog(`AI: 💰 인센티브! ${job.icon} ${job.name} → +${fmt(bonus)} (${rateLabel})`, 'important');
    endTurn(isDouble);
  } else {
    showModal('💰 인센티브 지급!',
      `<div style="text-align:center;padding:8px 0">
        <div style="font-size:2.5rem;margin-bottom:8px">${job.icon}</div>
        <div style="font-size:1rem;font-weight:bold;margin-bottom:4px">${job.name}</div>
        <div style="font-size:0.8rem;color:#aaa;margin-bottom:14px">${rateLabel} 인센티브 지급</div>

function handleCheongak(playerIdx, isDouble) {
  const cp = state.players[playerIdx];

  if(cp.isAI) {
    // AI: 살 수 있는 매물 중 가장 싼 것 아파트 반값 구매
    const targets = CELLS.filter(c =>
      c.type === 'prop' && myEntries(c.id, playerIdx).length === 0 && cp.money >= Math.floor(getBld(c.id).buy[2] / 2)
    );
    if(targets.length > 0) {
      const target = targets[0];
      const halfPrice = Math.floor(getBld(target.id).buy[2] / 2);
      cp.money -= halfPrice;
      if(!state.props[target.id]) state.props[target.id] = [];
      state.props[target.id].push({ owner: playerIdx, buildings: 2 });
      trackPropBought(playerIdx, target.id, halfPrice);
      addLog(`AI: 🏠 청약! ${target.name} 아파트 반값 구매 (${fmt(halfPrice)})`, 'important');
    } else {
      addLog(`AI: 🏠 청약 — 구매 가능한 매물 없음.`, 'normal');
    }
    endTurn(isDouble);
    return;
  }

  // 플레이어: 미소유 매물 목록 표시
  const available = CELLS.filter(c =>
    c.type === 'prop' && myEntries(c.id, playerIdx).length === 0
  );

  if(available.length === 0) {
    showModal('🏠 청약',
      `<p>현재 구매 가능한 매물이 없습니다.</p>`,
      [{ text:'확인', cls:'btn-ok', cb: () => endTurn(isDouble) }]
    );
    return;
  }

  const listHtml = available.map(c => {
    const bld = getBld(c.id);
    const villaFull = bld.buy[2];
    const half = Math.floor(villaFull / 2);
    const canAfford = cp.money >= half;

window.doCheongak = function(cellId, isDoubleInt) {
  const isDouble = !!isDoubleInt;
  const playerIdx = state.currentPlayer;
  const cp = state.players[playerIdx];
  const cell = CELLS[cellId];
  const bld = getBld(cellId);
  const halfPrice = Math.floor(bld.buy[2] / 2);

  if(cp.money < halfPrice) { alert('잔액이 부족합니다!'); return; }

  cp.money -= halfPrice;
  if(!state.props[cellId]) state.props[cellId] = [];
  state.props[cellId].push({ owner: playerIdx, buildings: 2 });
  trackPropBought(playerIdx, cellId, halfPrice);
  addLog(`${cp.name}: 🏠 청약! ${cell.name} 아파트 반값 구매 (${fmt(halfPrice)})`, 'important');
  updateUI();
  closeModal();
  endTurn(isDouble);
};

function applyCard(card, playerIdx) {
  const cp = state.players[playerIdx];
  const opponent = state.players[1 - playerIdx];

  switch(card.type) {
    case 'money':
      cp.money += card.amount;
      break;
    case 'move': {
      const preMovePos = cp.pos;
      cp.pos = card.target;
      if(card.bonus) cp.money += card.bonus;
      // 출발점 통과 또는 이동 목표가 이전 위치보다 앞(낮은 번호)이면 한 바퀴 완주
      if(card.target < preMovePos) {
        handleLapCompletion(playerIdx);
      }
      renderTokens();
      break;
    }
    case 'repair': {
      const houses = allOwnedBy(playerIdx).filter(({entry})=>entry.buildings===1).length;
      const hotels = allOwnedBy(playerIdx).filter(({entry})=>entry.buildings>=2).length;
      const fee = houses * card.house + hotels * card.hotel;
      cp.money -= fee;
      if(fee > 0) addLog(`${cp.name}: 수리비 ${fmt(fee)} 납부`, 'bad');
      break;
    }
    case 'fromopponent':
      cp.money += card.amount;
      opponent.money -= card.amount;
      break;
    case 'neartransport': {
      const transports = [12, 19];
      const near = transports.find(t => t > cp.pos) || transports[0];
      if(near <= cp.pos) handleLapCompletion(playerIdx); // passed go
      cp.pos = near;
      renderTokens();
      break;
    }
  }

  if(opponent.money < 0 && state.phase !== 'gameover') {
    checkBankruptcy(1 - playerIdx, false);
  }
  if(cp.money < 0 && state.phase !== 'gameover') {
    checkBankruptcy(playerIdx, false);
  }
}

function calcCoinMultiplier(coin) {
  const isWin = Math.random() < coin.upChance;
  if(isWin) {
    const [min, max] = coin.upRange;
    return min + Math.random() * (max - min);
  } else {
    const [min, max] = coin.downRange;
    return min + Math.random() * (max - min); // 음수
  }
}

function resolveCoinInvestment(cp, ind) {
  const pending = state._coinInvestment;
  // 수령액 = 투자금 × (1 + 수익률), 최소 0

  const displayProfit = returnAmt - pending.amount;
  const isWin = displayProfit > 0;
  cp.money += returnAmt;
  state._coinInvestment = null;

  if(cp.isAI) {
    addLog(`AI: 🪙 ${pending.coin.icon} ${pending.coin.name} 결과 — ${isWin?'수익':'손실'} ${isWin?'+':''}${fmt(displayProfit)} (${Math.round(pending.multiplier*100)}%)`, isWin?'important':'bad');

// state.props[cellId] = [{owner, buildings}, ...] 배열
// 소유 여부 체크
function propEntries(cellId) { return state.props[cellId] || []; }
function myEntries(cellId, pi=0) { return propEntries(cellId).filter(e=>e.owner===pi); }
function otherEntries(cellId, pi=0) { return propEntries(cellId).filter(e=>e.owner!==pi); }
// 플레이어 전체 소유 목록: [{cellId, entryIdx, entry}]
function allOwnedBy(pi) {
  const res = [];
  Object.entries(state.props).forEach(([id,list])=>{
    if(!Array.isArray(list)) return;
    list.forEach((e,i)=>{ if(e.owner===pi) res.push({cellId:+id, entryIdx:i, entry:e}); });
  });
  return res;
}
// 교통/유틸 단일 소유 (기존 방식 유지 — 칸당 1개 허용)
function firstEntry(cellId) { const l=propEntries(cellId); return l.length>0?l[0]:null; }

  return CELL_BLD[cellId] || { buy:[0,50000,150000,350000], sell:[0,25000,75000,175000] };
}

// 전체 건물 매매 모달 (직접 호출용 — 현재는 미사용)
function openTradeModal() {
  const me = state.players[0];
  renderTradeModal();
}

function renderTradeModal() {
  const me     = state.players[0];
  const cellId = state._landedCellId;
  const list   = state.props[cellId] || [];
  const cell   = CELLS[cellId];
  // 내 entry — 업그레이드 대상 (여러 채면 가장 낮은 레벨 우선)
  const myEntries = list.filter(e => e.owner === 0);
  const prop = myEntries.length > 0
    ? myEntries.reduce((a,b) => a.buildings <= b.buildings ? a : b)
    : null;
  // 실제 prop 인덱스 (list 내 위치)
  state._tradeEntryIdx = prop ? list.indexOf(prop) : -1;

  const bld = getBld(cellId);
  const c   = COLORS[cell.color] || '#999';
  const lvl = prop ? prop.buildings : 0;

  let radios = '';
  for(let i = 0; i <= 3; i++) {
    const isSelected = lvl === i;
    const cost   = i > lvl ? bld.buy[i]  - bld.buy[lvl]  : 0;
    const refund = i < lvl ? bld.sell[lvl] - (i > 0 ? bld.sell[i] : 0) : 0;
    const affordable = i <= lvl || me.money >= cost;

    let label = BLD_NAMES[i];
    if(i > lvl)      label += ` <span style="color:#82e0aa;font-size:0.68rem">매입 ${fmt(cost)}</span>`;
    else if(i < lvl) label += ` <span style="color:#f1948a;font-size:0.68rem">환급 ${fmt(refund)}</span>`;
    else             label += ` <span style="color:#aaa;font-size:0.68rem">(현재)</span>`;

    radios += `
      <label style="display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:8px;
        cursor:${affordable?'pointer':'not-allowed'};
        background:${isSelected?'rgba(245,200,66,0.2)':'rgba(255,255,255,0.05)'};
        border:1px solid ${isSelected?'rgba(245,200,66,0.6)':'rgba(255,255,255,0.1)'};
        opacity:${affordable?1:0.4};margin-bottom:4px">
        <input type="radio" name="bld_single" value="${i}" ${isSelected?'checked':''} ${affordable?'':'disabled'}
          onchange="updateTradeCost()" style="accent-color:#f5c842">
        <span style="font-size:0.82rem">${label}</span>
      </label>`;
  }

  const content = `
    <div style="text-align:left">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <span style="display:inline-block;width:14px;height:14px;background:${c};border-radius:3px"></span>
        <b style="font-size:1rem">${cell.name}</b>
        <span style="font-size:0.75rem;color:#aaa">현재: ${BLD_NAMES[lvl]}</span>
      </div>
      ${radios}
      <div style="margin-top:10px;padding:8px;background:rgba(245,200,66,0.1);border-radius:8px;
        display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:0.78rem;color:#aaa">💰 잔액: <b style="color:#f5c842">${fmt(me.money)}</b></span>
        <span style="font-size:0.85rem">변동: <b id="tradeCostDisplay" style="color:#f5c842">0원</b></span>
      </div>
    </div>`;

  document.getElementById('modalTitle').textContent = `🏠 ${cell.name} 부동산 매매`;
  document.getElementById('modalContent').innerHTML = content;
  const btns = document.getElementById('modalBtns');
  btns.innerHTML = '';

  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'btn-yes';
  confirmBtn.textContent = '거래 확정 ✅';
  confirmBtn.onclick = () => confirmTrade([[String(cellId), prop]]);
  btns.appendChild(confirmBtn);

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn-no';
  cancelBtn.textContent = '취소 ❌';
  cancelBtn.onclick = () => document.getElementById('modalOverlay').classList.remove('show');
  btns.appendChild(cancelBtn);

  document.getElementById('modalOverlay').classList.add('show');
  updateTradeCost();
}

function updateTradeCost() {
  const me   = state.players[0];
  const cellId = state._landedCellId;
  const list = state.props[cellId] || [];
  const prop = state._tradeEntryIdx >= 0 ? list[state._tradeEntryIdx] : null;
  if(!prop) return;
  const bld = getBld(cellId);
  const sel = document.querySelector(`input[name="bld_single"]:checked`);
  if(!sel) return;
  const newLvl = +sel.value;
  const cur = prop.buildings;
  let total = 0;
  if(newLvl > cur)      total = -(bld.buy[newLvl]  - bld.buy[cur]);
  else if(newLvl < cur) total =  (bld.sell[cur] - (newLvl > 0 ? bld.sell[newLvl] : 0));
  const el = document.getElementById('tradeCostDisplay');
  if(!el) return;
  if(total >= 0) {
    el.style.color = '#82e0aa';
    el.textContent = `+${fmt(total)} 수입`;
  } else {
    el.style.color = (me.money + total < 0) ? '#f1948a' : '#f5c842';
    el.textContent = `${fmt(Math.abs(total))} 지출`;
  }
}

function confirmTrade(owned) {
  const me = state.players[0];
  let totalCost = 0;
  const changes = [];

  owned.forEach(([id, prop]) => {
    const sel = document.querySelector(`input[name="bld_single"]:checked`);
    if(!sel) return;
    const bld = getBld(+id);
    const newLvl = +sel.value;
    const cur = prop.buildings;
    if(newLvl === cur) return;

    if(newLvl > cur) {
      const cost = bld.buy[newLvl] - bld.buy[cur];
      totalCost += cost;
      changes.push({ id, prop, newLvl, delta: -cost });
    } else {
      const refund = bld.sell[cur] - (newLvl > 0 ? bld.sell[newLvl] : 0);
      totalCost -= refund;
      changes.push({ id, prop, newLvl, delta: refund });
    }
  });

  if(me.money - totalCost < 0) {
    showModal('💸 자금 부족',
      `<p>총 지출 ${fmt(totalCost)}이 보유금액 ${fmt(me.money)}을 초과합니다!</p>`,
      [{ text:'다시 선택', cls:'btn-ok', cb: () => renderTradeModal() }]);
    return;
  }

  if(changes.length === 0) {
    document.getElementById('modalOverlay').classList.remove('show');
    return;
  }

  changes.forEach(({ id, prop, newLvl, delta }) => {
    const cell = CELLS[+id];
    const list = state.props[+id];
    if(newLvl === 0 && list) {
      // 레벨 0 = 매도 (entry 제거)
      const idx2 = list.indexOf(prop);
      if(idx2 !== -1) list.splice(idx2, 1);
      if(list.length === 0) delete state.props[+id];
    } else {
      prop.buildings = newLvl;
    }
    me.money += delta;
    const dir = delta > 0 ? `매각 +${fmt(delta)}` : `매입 -${fmt(-delta)}`;
    addLog(`나: ${cell.name} → ${newLvl === 0 ? '매도' : BLD_NAMES[newLvl]} ${dir}`, 'important');
  });

  document.getElementById('modalOverlay').classList.remove('show');
  updateUI();
}

function renderBuildPanel() {
  const content = document.getElementById('buildContent');
  const owned = allOwnedBy(0).filter(({cellId})=>CELLS[cellId].type==='prop');

  if(owned.length === 0) {
    content.innerHTML = '<span style="color:#aaa;font-size:0.8rem">아직 소유한 땅이 없습니다.</span>';
    return;
  }

  content.innerHTML = '<div class="properties-list">' +
    owned.map(({cellId, entry}) => {
      const cell = CELLS[cellId];
      const bld  = getBld(cellId);
      const c    = COLORS[cell.color] || '#999';
      const lvl  = entry.buildings;
      const nextPrice = lvl < 3 ? fmt(bld.buy[lvl+1] - bld.buy[lvl]) : '최고등급';
      return `<span class="prop-tag"
        style="background:${c}22;border-color:${c}66;color:#fff;cursor:default"
        title="다음 매입: ${nextPrice}">
        ${cell.name} [${BLD_NAMES[lvl]}]
      </span>`;
    }).join('') + '</div>';
}

// AI 건물 업그레이드 (첫 바퀴 이후, 자금 여유 있을 때)
function aiUpgradeBuildings() {
  const ai = state.players[1];
  if(ai.money <= 0) return;
  const owned = allOwnedBy(1).filter(({cellId})=>CELLS[cellId].type==='prop');
  for(const {cellId: id, entry: prop} of owned) {
    if(prop.buildings < 3) {
      const bld  = getBld(id);
      const cost = bld.buy[prop.buildings+1] - bld.buy[prop.buildings];
      if(ai.money >= cost * 2) {
        ai.money -= cost;
        prop.buildings++;
        addLog(`AI: ${CELLS[id].name} → ${BLD_NAMES[prop.buildings]} 매입!`, 'important');
      }
    }
  }
}

            ${freeCount > 0 ? `<span style="color:#666">${freeCount}빈칸</span>` : ''}
          </div>
        </div>
        <div class="territory-bar-wrap">
          ${myCount  > 0 ? `<div style="width:${myW}%;background:#e74c3c;transition:width 0.4s"></div>` : ''}
          ${freeCount > 0 ? `<div style="width:${freeW}%;background:rgba(255,255,255,0.08)"></div>` : ''}
          ${aiCount  > 0 ? `<div style="width:${aiW}%;background:#3498db;transition:width 0.4s"></div>` : ''}
        </div>
        ${myBuildings || aiBuildings ? `<div class="territory-buildings">${myBuildings}${aiBuildings}</div>` : ''}
      </div>`;
  }).join('');

  el.innerHTML = summary + rows;
}

function trackSalary(playerIdx, salary, jobName) {
  const p = state.players[playerIdx];
  p.stats.totalSalary += salary;
  p.stats.totalIncome += salary;
  if(salary > 0) p.stats.bestJob = jobName;
}

function trackRentPaid(playerIdx, amount) {
  state.players[playerIdx].stats.totalRent += amount;
}

function trackPropBought(playerIdx, cellId, cost) {
  state.players[playerIdx].stats.propsBought++;
  if(!state._firstPropDone) {
    state._firstPropDone = true;
    state._pendingFirstPropEvent = { playerIdx, cellId, cost };
  }
}

// ==================== 대출 시스템 ====================
// 금리: 연 4.5% (2025 주담대 기준), 바퀴당 이자 = 대출잔액 × 4.5% / 12
// 한도: 보유 부동산 가치 합계의 70% (LTV 70%)
const LOAN_RATE_PER_LAP = 0.045 / 12; // 월 이자율 (바퀴 = 1개월 개념)

function getLoanLimit(playerIdx) {
  const propValue = allOwnedBy(playerIdx).reduce((sum, {cellId, entry}) => {
    const bld = getBld(cellId);
    return sum + (bld ? bld.sell[entry.buildings] : 0);
  }, 0);
  return Math.floor(propValue * 0.7);
}

function getLoanAvailable(playerIdx) {
  const cp = state.players[playerIdx];
  return Math.max(0, getLoanLimit(playerIdx) - (cp.loan || 0));
}

// ==================== 부동산 시세 변동 ====================
// 누군가 5바퀴 돌 때마다 발동 (5, 10, 15, 20 ... 바퀴)
function checkMarketFluctuation(triggerPlayerIdx) {
  const maxLaps = Math.max(state.players[0].laps || 0, state.players[1].laps || 0);
  if(maxLaps === 0 || maxLaps % 5 !== 0) return;
  // 이미 이 바퀴에서 발동됐으면 스킵
  if(state._lastFluctuationLap === maxLaps) return;
  state._lastFluctuationLap = maxLaps;

  // 구역별 랜덤 시세 변동: -40% ~ +60% (양수 편향)
  const changes = [];
  state._marketChanges = {};
  state._prevBld = {};
  Object.keys(CELL_BLD).forEach(id => {
    const r = (Math.random() * 100) - 40;
    const pct = Math.round(r / 10) * 10;
    if(pct === 0) return;
    const factor = 1 + pct / 100;
    const bld = CELL_BLD[id];
    state._prevBld[id] = { buy: [...bld.buy], sell: [...bld.sell] };
    bld.buy  = bld.buy.map(v => Math.round(v * factor / 10000000) * 10000000);
    bld.sell = bld.sell.map(v => Math.round(v * factor / 10000000) * 10000000);
    const cell = CELLS[+id];
    state._marketChanges[id] = pct;
    changes.push({ name: cell.name, pct, up: pct > 0 });
  });

  const ups   = changes.filter(c => c.up);
  const downs = changes.filter(c => !c.up);

  const upHtml   = ups.slice(0,5).map(c =>
    `<span style="color:#82e0aa">↑ ${c.name} +${c.pct}%</span>`).join('<br>');
  const downHtml = downs.slice(0,5).map(c =>
    `<span style="color:#f1948a">↓ ${c.name} ${c.pct}%</span>`).join('<br>');

  const content = `
    <div style="text-align:left">
      <div style="padding:8px 12px;background:rgba(255,255,255,0.06);border-radius:8px;margin-bottom:10px;font-size:0.82rem;color:#aaa">
        📊 ${maxLaps}바퀴 완주 — 서울 부동산 시장이 요동쳤습니다!
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:0.82rem;line-height:1.9">
        <div><b style="color:#82e0aa">📈 상승</b><br>${upHtml || '<span style="color:#aaa">없음</span>'}</div>
        <div><b style="color:#f1948a">📉 하락</b><br>${downHtml || '<span style="color:#aaa">없음</span>'}</div>
      </div>
      <p style="margin-top:10px;font-size:0.78rem;color:#aaa">💡 보유 부동산 매도가도 함께 변동됩니다.</p>
    </div>`;

  addLog(`📊 ${maxLaps}바퀴 시세 변동! 상승 ${ups.length}곳 / 하락 ${downs.length}곳`, 'important');

  renderCellOwnership();

  // landOn에서 이동 완료 후 순서 보장하여 표시
  state._pendingMarketEvent = { content };
}

function openSellModal() {
  const me = state.players[0];
  // 내 소유 entry 목록 (cellId, entryIdx 포함)
  const owned = [];
  Object.entries(state.props).forEach(([id, list]) => {

    list.forEach((entry, ei) => {

    });
  });

  if(owned.length === 0) {
    showModal('🏷️ 매도', '<p style="color:#aaa">보유 중인 부동산이 없습니다.</p>',
      [{ text:'닫기', cls:'btn-ok', cb: closeModal }]);

  const rows = owned.map(({ cellId, entryIdx, entry }, i) => {
    const cell = CELLS[cellId];
    const bld  = getBld(cellId);
    const lvl  = entry.buildings;
    const sellPrice = bld.sell[lvl];
    const col  = COLORS[cell.color] || '#888';

          background:${col};flex-shrink:0"></span>
        <span style="flex:1;font-size:0.85rem">
          <b>${cell.name}</b>
          ${cell.type === 'prop' ? `<span style="color:#aaa;font-size:0.75rem;margin-left:4px">[${BLD_NAMES[lvl]}]</span>` : ''}
        </span>
        <b style="color:#82e0aa;font-size:0.85rem">${fmt(sellPrice)}</b>
      </label>`;
  }).join('');

  showModal('🏷️ 부동산 매도',
    `<div>
      <p style="font-size:0.82rem;color:#aaa;margin-bottom:10px">
        💰 보유액 <b style="color:#f5c842">${fmt(me.money)}</b> · 매도 후 해당 채 소멸
      </p>
      ${rows}
    </div>`,
    [
      { text:'매도 ✅', cls:'btn-yes', cb: () => {
        const sel = document.querySelector('input[name="sell_prop"]:checked');
        if(!sel) { alert('매도할 부동산을 선택하세요!'); return; }
        const i = +sel.value;
        const { cellId, entryIdx, entry } = owned[i];
        const bld  = getBld(cellId);
        const cell = CELLS[cellId];
        const price = bld.sell[entry.buildings];

        const bldLabel = cell.type === 'prop' ? ` [${BLD_NAMES[entry.buildings]}]` : '';
        addLog(`나: 🏷️ ${cell.name}${bldLabel} 매도 +${fmt(price)}`, 'important');
        closeModal();
        updateUI();
        renderCellOwnership();
      }},
      { text:'취소 ❌', cls:'btn-no', cb: closeModal }
    ]
  );
}


function payLoanInterest(playerIdx) {
  const cp = state.players[playerIdx];
  if(!cp.loan || cp.loan <= 0) return;
  const interest = Math.round(cp.loan * LOAN_RATE_PER_LAP);
  cp.money -= interest;
  addLog(`${cp.name}: 🏦 대출이자 납부 ${fmt(interest)} (잔액 ${fmt(cp.loan)}, 연4.5%)`, 'bad');
  if(cp.money < 0 && state.phase !== 'gameover') checkBankruptcy(playerIdx, false);
}

// AI 대출 판단: 살 수 있는 부동산이 있는데 돈이 부족하면 자동 대출
function aiLoanIfNeeded() {
  const ai = state.players[1];
  const available = getLoanAvailable(1);
  if(available <= 0) return;
  const wantToBuy = CELLS.find(c =>
    c.type === 'prop' && !state.props[c.id] &&
    ai.money < getBld(c.id).buy[1] * 1.2 && (ai.money + available) >= getBld(c.id).buy[1] * 1.2
  );
  if(wantToBuy) {
    const needed = Math.ceil((getBld(wantToBuy.id).buy[1] * 1.2 - ai.money) / 10000000) * 10000000;
    const loanAmt = Math.min(needed, available);
    ai.loan = (ai.loan || 0) + loanAmt;
    ai.money += loanAmt;
    addLog(`AI: 🏦 대출 ${fmt(loanAmt)} 실행 (목표: ${wantToBuy.name})`, 'important');
  }
}

function checkBankruptcy(playerIdx, isDouble) {
  const cp = state.players[playerIdx];
  if(cp.money < 0) {
    addLog(`${cp.name}: 파산! 게임 종료`, 'bad');
    showGameOverStats(1 - playerIdx, playerIdx, '파산');
    return;
  }
  endTurn(isDouble);
}

// 순자산 = 현금 + 보유 부동산 매도가 합계 - 대출잔액
function getNetWorth(playerIdx) {
  const cp = state.players[playerIdx];
  const propValue = allOwnedBy(playerIdx).reduce((sum, {cellId, entry}) => {
    const bld = getBld(cellId);
    return sum + (bld ? bld.sell[entry.buildings] : 0);
  }, 0);
  return Math.max(0, cp.money) + propValue - (cp.loan || 0);
}

const WIN_NET_WORTH = 10000000000; // 100억 순자산 달성
const MAX_LAPS      = 50;          // 50바퀴 (둘 중 높은 쪽 기준)

function checkWinConditions() {
  if(state.phase === 'gameover') return;

  // 1. 순자산 100억 달성
  for(let i = 0; i < 2; i++) {
    if(getNetWorth(i) >= WIN_NET_WORTH) {
      addLog(`${state.players[i].name}: 순자산 100억 달성! 🏆`, 'important');
      showGameOverStats(i, 1 - i, '자산목표달성');
      return;
    }
  }

  // 2. 50바퀴 도달 — 순자산 비교
  const maxLaps = Math.max(state.players[0].laps || 0, state.players[1].laps || 0);
  if(maxLaps >= MAX_LAPS) {
    const nw0 = getNetWorth(0);
    const nw1 = getNetWorth(1);
    const winner = nw0 >= nw1 ? 0 : 1;
    addLog(`50바퀴 종료! 순자산 비교 — 나: ${fmt(nw0)} vs AI: ${fmt(nw1)}`, 'important');
    showGameOverStats(winner, 1 - winner, '턴종료');
  }
}

// ==================== TURN END ====================
function endTurn(isDouble) {
  state.totalTurns++;
  state.players[state.currentPlayer].stats.turns++;

  // 승리 조건 체크
  checkWinConditions();
  if(state.phase === 'gameover') return;

  if(isDouble && state.doubleCount > 0) {
    addLog(`더블! 한 번 더 굴립니다.`, 'important');
    state.phase = 'roll';
    updateUI();
    if(state.players[state.currentPlayer].isAI) {
      setTimeout(() => aiTurn(), 600);
    }
    return;
  }

  state.doubleCount = 0;
  state.currentPlayer = 1 - state.currentPlayer;
  announceTurn();
}

// ==================== AI ====================
function aiTurn() {
  if(state.phase !== 'roll') return;
  const ai = state.players[state.currentPlayer];
  if(!ai.isAI) return;

  // AI 건물 매매 판단
  aiUpgradeBuildings();
  // AI 대출 판단
  aiLoanIfNeeded();

  addLog('AI가 주사위를 굴립니다...');

  const d1 = Math.floor(Math.random()*6)+1;
  const d2 = Math.floor(Math.random()*6)+1;
  const isDouble = d1 === d2;
  const total = d1 + d2;

  renderDie('die1', d1);
  renderDie('die2', d2);
  addLog(`AI: 🎲 ${d1}+${d2}=${total}${isDouble?' (더블!)':''}`);

  setTimeout(() => {
    if(isDouble) {
      state.doubleCount++;
      if(state.doubleCount >= 3) {
        addLog('AI: 더블 3회! 한 번 쉽니다.', 'bad');
        endTurn(false);
        return;
      }
    } else {
      state.doubleCount = 0;
    }
    movePlayer(state.currentPlayer, total, isDouble);
  }, 500);
}
