<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0320"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe066"/>
      <stop offset="100%" style="stop-color:#c8960c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern (board-like) -->
  <g opacity="0.08" stroke="#f5c842" stroke-width="1" fill="none">
    <line x1="0" y1="63" x2="1200" y2="63"/>
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="189" x2="1200" y2="189"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="441" x2="1200" y2="441"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="0" y1="567" x2="1200" y2="567"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
  </g>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#f5c842"/>

  <!-- Title: 서울 시티 인베스트 -->
  <text x="80" y="230"
        font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif"
        font-size="88" font-weight="900" letter-spacing="-2"
        fill="url(#goldText)" filter="url(#glow)">서울 시티</text>
  <text x="80" y="330"
        font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif"
        font-size="88" font-weight="900" letter-spacing="-2"
        fill="url(#goldText)" filter="url(#glow)">인베스트</text>

  <!-- Subtitle -->
  <text x="82" y="390"
        font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif"
        font-size="28" fill="#ffffff" opacity="0.85" letter-spacing="1">
    한국형 부동산 보드게임 · 무료 플레이
  </text>

  <!-- Divider line -->
  <line x1="80" y1="420" x2="580" y2="420" stroke="#f5c842" stroke-width="2" opacity="0.4"/>

  <!-- Districts -->
  <text x="82" y="458"
        font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif"
        font-size="22" fill="#aaaacc" letter-spacing="2">
    강남 · 여의도 · 홍대 · 마포 · 강북
  </text>

  <!-- Building illustrations (right side) -->

  <!-- Building 1: Villa (smallest) -->
  <g transform="translate(750, 380)" filter="url(#shadow)">
    <!-- House body -->
    <rect x="0" y="40" width="80" height="60" rx="3" fill="#2d7a3a"/>
    <!-- Roof -->
    <polygon points="40,0 -10,45 90,45" fill="#1e5c2a"/>
    <!-- Door -->
    <rect x="30" y="70" width="20" height="30" rx="2" fill="#1a3d20"/>
    <!-- Windows -->
    <rect x="8" y="52" width="18" height="14" rx="2" fill="#7fffb0" opacity="0.6"/>
    <rect x="54" y="52" width="18" height="14" rx="2" fill="#7fffb0" opacity="0.6"/>
    <!-- Label -->
    <text x="40" y="120" font-family="sans-serif" font-size="14" fill="#2d7a3a" text-anchor="middle" font-weight="bold">빌라</text>
  </g>

  <!-- Building 2: Apartment (medium) -->
  <g transform="translate(880, 300)" filter="url(#shadow)">
    <!-- Body -->
    <rect x="0" y="0" width="90" height="140" rx="3" fill="#1a4a7a"/>
    <!-- Roof detail -->
    <rect x="0" y="0" width="90" height="12" rx="2" fill="#0d2d50"/>
    <!-- Windows grid -->
    <rect x="10" y="20" width="20" height="18" rx="1" fill="#7fc8ff" opacity="0.6"/>
    <rect x="38" y="20" width="20" height="18" rx="1" fill="#7fc8ff" opacity="0.6"/>
    <rect x="60" y="20" width="20" height="18" rx="1" fill="#7fc8ff" opacity="0.6"/>
    <rect x="10" y="48" width="20" height="18" rx="1" fill="#7fc8ff" opacity="0.6"/>
    <rect x="38" y="48" width="20" height="18" rx="1" fill="#7fc8ff" opacity="0.6"/>
    <rect x="60" y="48" width="20" height="18" rx="1" fill="#7fc8ff" opacity="0.6"/>
    <rect x="10" y="76" width="20" height="18" rx="1" fill="#7fc8ff" opacity="0.6"/>
    <rect x="38" y="76" width="20" height="18" rx="1" fill="#7fc8ff" opacity="0.6"/>
    <rect x="60" y="76" width="20" height="18" rx="1" fill="#7fc8ff" opacity="0.6"/>
    <!-- Door -->
    <rect x="30" y="110" width="30" height="30" rx="2" fill="#0d2d50"/>
    <!-- Label -->
    <text x="45" y="158" font-family="sans-serif" font-size="14" fill="#1a4a7a" text-anchor="middle" font-weight="bold">아파트</text>
  </g>

  <!-- Building 3: Skyscraper (tallest) -->
  <g transform="translate(1020, 180)" filter="url(#shadow)">
    <!-- Main body -->
    <rect x="5" y="30" width="100" height="260" rx="4" fill="#5a1a7a"/>
    <!-- Spire -->
    <rect x="48" y="0" width="14" height="35" rx="2" fill="#3d0f52"/>
    <!-- Glass facade lines -->
    <line x1="35" y1="30" x2="35" y2="290" stroke="#9b59b6" stroke-width="1" opacity="0.5"/>
    <line x1="75" y1="30" x2="75" y2="290" stroke="#9b59b6" stroke-width="1" opacity="0.5"/>
    <line x1="5" y1="80" x2="105" y2="80" stroke="#9b59b6" stroke-width="1" opacity="0.4"/>
    <line x1="5" y1="130" x2="105" y2="130" stroke="#9b59b6" stroke-width="1" opacity="0.4"/>
    <line x1="5" y1="180" x2="105" y2="180" stroke="#9b59b6" stroke-width="1" opacity="0.4"/>
    <line x1="5" y1="230" x2="105" y2="230" stroke="#9b59b6" stroke-width="1" opacity="0.4"/>
    <!-- Window highlights -->
    <rect x="12" y="40" width="16" height="28" rx="1" fill="#d7a8ff" opacity="0.3"/>
    <rect x="42" y="40" width="16" height="28" rx="1" fill="#d7a8ff" opacity="0.3"/>
    <rect x="82" y="40" width="16" height="28" rx="1" fill="#d7a8ff" opacity="0.3"/>
    <rect x="12" y="90" width="16" height="28" rx="1" fill="#d7a8ff" opacity="0.5"/>
    <rect x="42" y="90" width="16" height="28" rx="1" fill="#d7a8ff" opacity="0.3"/>
    <rect x="82" y="90" width="16" height="28" rx="1" fill="#d7a8ff" opacity="0.3"/>
    <rect x="12" y="140" width="16" height="28" rx="1" fill="#d7a8ff" opacity="0.3"/>
    <rect x="42" y="140" width="16" height="28" rx="1" fill="#d7a8ff" opacity="0.5"/>
    <rect x="82" y="140" width="16" height="28" rx="1" fill="#d7a8ff" opacity="0.3"/>
    <rect x="12" y="190" width="16" height="28" rx="1" fill="#d7a8ff" opacity="0.3"/>
    <rect x="42" y="190" width="16" height="28" rx="1" fill="#d7a8ff" opacity="0.3"/>
    <rect x="82" y="190" width="16" height="28" rx="1" fill="#d7a8ff" opacity="0.5"/>
    <!-- Door -->
    <rect x="42" y="255" width="26" height="35" rx="2" fill="#3d0f52"/>
    <!-- Label -->
    <text x="55" y="308" font-family="sans-serif" font-size="14" fill="#9b59b6" text-anchor="middle" font-weight="bold">빌딩</text>
  </g>

  <!-- Ground line -->
  <line x1="730" y1="490" x2="1170" y2="490" stroke="#f5c842" stroke-width="2" opacity="0.3"/>

  <!-- Upgrade arrows between buildings -->
  <text x="846" y="472" font-family="sans-serif" font-size="28" fill="#f5c842" opacity="0.7">→</text>
  <text x="982" y="472" font-family="sans-serif" font-size="28" fill="#f5c842" opacity="0.7">→</text>

  <!-- URL bottom right -->
  <text x="1150" y="608"
        font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',monospace"
        font-size="20" fill="#888aaa" text-anchor="end" opacity="0.8">
    mabul.kakao.link
  </text>

  <!-- Bottom accent bar -->
  <rect x="0" y="622" width="1200" height="8" fill="url(#goldText)" opacity="0.5"/>
</svg>
